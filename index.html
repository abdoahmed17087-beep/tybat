<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الطيبات AI | دليلك للوجبات الاستشفائية</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>الطيبات AI</h1>
            <p class="tagline">نظام الدكتور ضياء العوضي الاستشفائي-رحمه الله</p>
        </header>

        <div class="main-card">
            <div class="dr-profile">
                <img src="ODg1LndlYnA.png" alt="الدكتور ضياء العوضي-رحمة الله" class="dr-photo">
                <div class="dr-title">اشفِ نفسك بالغذاء</div>
            </div>

            <button id="generateBtn" class="btn-primary">✨ خطط لي يوم الطيبات بالكامل</button>
            <div id="loading" class="loader" style="display: none;">جاري استشارة المخطط الذكي...</div>
            <div id="mealResult" class="result-area"></div>
        </div>
    </div>
    <script src="script.js"></script>
